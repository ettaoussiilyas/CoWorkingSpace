spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT Test Configuration — must match property keys in JwtService
application.security.jwt.secret-key=dGVzdHNlY3JldGtleXRlc3RzZWNyZXRrZXl0ZXN0c2VjcmV0a2V5dGVzdA==
application.security.jwt.expiration=3600000

# Admin seed — required by ApplicationConfig CommandLineRunner
application.admin.email=admin@test.com
application.admin.password=TestAdmin123!

# Mail Test Configuration
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test

# Cloudinary Test Configuration
cloudinary.cloud-name=test
cloudinary.api-key=test
cloudinary.api-secret=test
application.cloudinary.url=cloudinary://test:test@test

# Liquibase
spring.liquibase.enabled=false

# CORS
application.cors.allowed-origins=http://localhost:4200
