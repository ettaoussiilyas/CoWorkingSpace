spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Use H2 dialect for tests. This overrides the PostgreSQL dialect set in main application.properties
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT Test Configuration
jwt.secret-key=testsecretkeytestsecretkeytestsecretkeytestsecretkey
jwt.expiration=3600000

# Mail Test Configuration
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test

# Cloudinary Test Configuration
cloudinary.cloud-name=test
cloudinary.api-key=test
cloudinary.api-secret=test
application.cloudinary.url=cloudinary://test:test@test

# Liquibase Configuration
spring.liquibase.enabled=false
