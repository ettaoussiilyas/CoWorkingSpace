spring.application.name=backend
debug=false
logging.level.root=INFO
logging.level.com.aihub=DEBUG

# Use 'postgres' (container name) for Docker, 'localhost' for local development
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/spacehub_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:spacehub_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:spacehub_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Disable Liquibase - use Hibernate for schema management
spring.liquibase.enabled=false

# Cloudinary Configuration
application.cloudinary.url=${CLOUDINARY_URL}
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Admin seed credentials (override in environment)
application.admin.email=${ADMIN_EMAIL:admin@spacehub.com}
application.admin.password=${ADMIN_PASSWORD}

# JWT
application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.expiration=86400000

# Mail Configuration (using localhost for development)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

application.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost}
