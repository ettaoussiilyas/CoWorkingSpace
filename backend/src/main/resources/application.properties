spring.application.name=backend
debug=false
logging.level.root=INFO
logging.level.com.aihub=DEBUG

# Use 'postgres' (container name) for Docker, 'localhost' for local development
spring.datasource.url=jdbc:postgresql://postgres:5432/spacehub_db
spring.datasource.username=spacehub_user
spring.datasource.password=spacehub_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Disable Liquibase - use Hibernate for schema management
spring.liquibase.enabled=false

# Cloudinary Configuration
application.cloudinary.url=cloudinary://123456789012345:ABCDE12345-FGHIJ67890KLMNO@dmh1v2p3z
cloudinary.cloud-name=dmh1v2p3z
cloudinary.api-key=123456789012345
cloudinary.api-secret=ABCDE12345-FGHIJ67890KLMNO

# Mail Configuration (using localhost for development)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

server.port=8080
