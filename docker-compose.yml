
services:
  postgres:
    image: postgres:16
    container_name: spacehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: spacehub_db
      POSTGRES_USER: spacehub_user
      POSTGRES_PASSWORD: spacehub_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spacehub_user -d spacehub_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: spacehub-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@spacehub.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    container_name: spacehub-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/spacehub_db
      SPRING_DATASOURCE_USERNAME: spacehub_user
      SPRING_DATASOURCE_PASSWORD: spacehub_password
      CLOUDINARY_URL: cloudinary://233696619453349:ClcnJUSENQkgqP1DJtC8H-e6rlM@ds21jcass
      CLOUDINARY_CLOUD_NAME: ds21jcass
      CLOUDINARY_API_KEY: "233696619453349"
      CLOUDINARY_API_SECRET: ClcnJUSENQkgqP1DJtC8H-e6rlM
      APPLICATION_CLOUDINARY_URL: cloudinary://233696619453349:ClcnJUSENQkgqP1DJtC8H-e6rlM@ds21jcass
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@spacehub.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ALLOWED_ORIGINS: http://localhost:4200,http://localhost
      SPRING_MAIL_HOST: localhost
      SPRING_MAIL_PORT: 1025
      SPRING_MAIL_USERNAME: ""
      SPRING_MAIL_PASSWORD: ""
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "false"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: spacehub-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
