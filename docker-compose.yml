version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: spacehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: spacehub_db
      POSTGRES_USER: spacehub_user
      POSTGRES_PASSWORD: spacehub_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: spacehub-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@spacehub.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: